<div class="bg-background flex min-h-vh flex-col items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold tracking-tight">Sign in</h1>
      <p class="text-muted-foreground text-sm">
        Continue to <span class="text-foreground font-medium">{{ appName }}</span>
      </p>
    </div>

    <section hlmCard>
      <form class="flex flex-col gap-4 p-6" [formGroup]="form" (ngSubmit)="submit()">
        @if (errorMessage()) {
          <p class="text-destructive text-sm" role="alert">{{ errorMessage() }}</p>
        }

        <div hlmField>
          <label hlmFieldLabel required for="login-email">Email</label>
          <input
            hlmInput
            id="login-email"
            type="email"
            autocomplete="email"
            formControlName="email"
            placeholder="you@example.com"
          />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <hlm-field-error>Enter a valid email address.</hlm-field-error>
          }
        </div>

        <div hlmField>
          <label hlmFieldLabel required for="login-password">Password</label>
          <input
            hlmInput
            id="login-password"
            type="password"
            autocomplete="current-password"
            formControlName="password"
            placeholder="••••••••"
          />
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <hlm-field-error>Password must be at least 6 characters.</hlm-field-error>
          }
        </div>

        <button hlmBtn type="submit" class="w-full" [disabled]="submitting()">
          @if (submitting()) {
            <hlm-spinner />
          }
          Sign in
        </button>
      </form>
    </section>
  </div>
</div>
