<div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
  <div>
    <h1 class="text-2xl font-semibold tracking-tight">Tasks</h1>
    <p class="text-muted-foreground text-sm">
      Sample CRUD with in-memory data — no API or database.
      <span class="text-foreground font-medium">{{ completedCount() }}/{{ total() }}</span>
      completed.
    </p>
  </div>

  <button hlmBtn type="button" (click)="createTask.emit()">
    <ng-icon name="lucidePlus" />
    Add task
  </button>
</div>
