<div class="flex flex-col gap-6">
  <app-task-toolbar
    [total]="total()"
    [completedCount]="completedCount()"
    (createTask)="openCreateForm()"
  />

  <app-task-table
    [tasks]="tasks()"
    (editTask)="openEditForm($event)"
    (deleteTask)="openDeleteDialog($event)"
  />
</div>

<app-task-form-sheet
  [open]="formOpen()"
  [taskId]="formTaskId()"
  (saved)="onFormSaved()"
  (dismissed)="closeForm()"
/>

<app-task-delete-dialog
  [open]="deleteDialogOpen()"
  [task]="deleteTarget()"
  (confirmed)="confirmDelete()"
  (dismissed)="closeDeleteDialog()"
/>
